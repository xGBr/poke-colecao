<!-- MODAL: ADD CARD -->
<div class="overlay" id="addModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('addModal')">×</button>
    <h2 class="modal-title">Cadastrar carta</h2>
    <div class="field">
      <label>Link da imagem</label>
      <div style="display:flex;gap:8px;align-items:center">
        <input type="text" id="cardImgUrl" placeholder="Cole o link do Imgur, Drive ou outra fonte..." style="flex:1" oninput="previewDriveUrl(this.value)">
        <img id="uploadPreview" alt="preview" style="display:none;width:44px;height:60px;object-fit:cover;border-radius:4px;border:1px solid var(--border);flex-shrink:0">
      </div>
      <div style="font-size:11px;color:var(--text-faint);margin-top:6px;line-height:1.6">
        <strong style="color:var(--text-dim)">Recomendado:</strong> <a href="https://imgur.com/upload" target="_blank" style="color:var(--accent);text-decoration:none">imgur.com/upload</a> — gratuito, sem bloqueio.<br>
        Google Drive: funciona com o link <code style="background:var(--panel);padding:1px 4px;border-radius:3px;font-size:10px">lh3.googleusercontent.com</code> (veja instruções abaixo).
      </div>
    </div>
    <div class="field">
      <label>Nome da carta</label>
      <input type="text" id="cardName" placeholder="ex: Machamp" oninput="onLigaInput('card')">
    </div>
    <div class="field-row">
      <div class="field">
        <label>Número / código</label>
        <input type="text" id="cardNum" placeholder="ex: 064/091">
      </div>
      <div class="field">
        <label>Categoria</label>
        <select id="cardCategory">
          <option value="Principal">Principal</option>
          <option value="Treinadores">Treinadores</option>
          <option value="Delta Species">Delta Species</option>
          <option value="Cartas da Cintia">Cartas da Cintia</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>Raridades que faltam</label>
      <div class="rarity-checks">
        <div class="rarity-check-item"><input type="checkbox" id="cardR-Normal" value="Normal"><span class="r-box">&#10003;</span><label for="cardR-Normal">Normal</label></div>
        <div class="rarity-check-item"><input type="checkbox" id="cardR-Foil" value="Foil"><span class="r-box">&#10003;</span><label for="cardR-Foil">Foil</label></div>
        <div class="rarity-check-item"><input type="checkbox" id="cardR-Reverse-Foil" value="Reverse Foil"><span class="r-box">&#10003;</span><label for="cardR-Reverse-Foil">Reverse Foil</label></div>
        <div class="rarity-check-item"><input type="checkbox" id="cardR-Cosmo-Holo" value="Cosmo Holo"><span class="r-box">&#10003;</span><label for="cardR-Cosmo-Holo">Cosmo Holo</label></div>
        <div class="rarity-check-item"><input type="checkbox" id="cardR-Pokeball-Foil" value="Pokeball Foil"><span class="r-box">&#10003;</span><label for="cardR-Pokeball-Foil">Pokeball Foil</label></div>
        <div class="rarity-check-item"><input type="checkbox" id="cardR-Master-Ball" value="Master Ball"><span class="r-box">&#10003;</span><label for="cardR-Master-Ball">Master Ball</label></div>
        <div class="rarity-check-item"><input type="checkbox" id="cardR-Play-Pokemon" value="Play Pokemon"><span class="r-box">&#10003;</span><label for="cardR-Play-Pokemon">Play! Pokémon</label></div>
        <div class="rarity-check-item"><input type="checkbox" id="cardR-Play-Pokemon-Cosmo" value="Play Pokemon Cosmo"><span class="r-box">&#10003;</span><label for="cardR-Play-Pokemon-Cosmo">Play! Pokémon (Cosmo)</label></div>
        <div class="rarity-check-item"><input type="checkbox" id="cardR-World-Championships" value="World Championships"><span class="r-box">&#10003;</span><label for="cardR-World-Championships">World Championships</label></div>
        <div class="rarity-check-item"><input type="checkbox" id="cardR-Staff" value="Staff"><span class="r-box">&#10003;</span><label for="cardR-Staff">Staff</label></div>
      </div>
    </div>
    <div class="field">
      <label>Coleção / expansão</label>
      <input type="text" id="cardSet" placeholder="ex: Scarlet & Violet — Stellar Crown">
    </div>
    <div class="field">
      <label style="display:flex;align-items:center;gap:6px">
        <img src="https://i.imgur.com/6Qreh4P.png" style="width:14px;height:14px;object-fit:contain">
        Link Liga Pokémon
      </label>
      <input type="text" id="cardLiga" placeholder="https://www.ligapokemon.com.br/?view=cards/card&...">
    </div>
    <div class="field">
      <label>Preço sugerido</label>
      <div class="price-row">
        <input type="text" id="cardPreco" placeholder="R$ 0,00" oninput="onPrecoInput('card')">
        <button class="btn-fetch" id="cardFetchBtn" onclick="fetchPreco('card')" disabled>🔄 Buscar</button>
      </div>
      <div class="price-hint" id="cardPrecoHint"></div>
    </div>
    <div class="field" style="display:flex;align-items:center;gap:10px;margin-bottom:0.5rem">
      <input type="checkbox" id="cardEspera" style="width:16px;height:16px;accent-color:var(--gold);cursor:pointer;flex-shrink:0">
      <label for="cardEspera" style="font-size:13px;color:var(--text-dim);cursor:pointer;text-transform:none;letter-spacing:0;margin:0">
        Em espera <span style="color:var(--text-faint);font-size:11px">— não exibe botão de contato</span>
      </label>
    </div>
    <button class="btn-primary" onclick="saveCard()">Salvar carta</button>
  </div>
</div>
